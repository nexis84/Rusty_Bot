<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Check - RustyBot</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://www.rustybot.co.uk/rusty_bot.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <a class="back-link" href="../index.html">← Back</a>

    <header>
        <img src="https://www.rustybot.co.uk/rusty_bot.png" alt="RustyBot Logo" class="logo">
        <h1>Market <span>Check</span></h1>
        <p class="subtitle">Live EVE market data at your fingertips.</p>
    </header>

    <section class="form-card">
        <div class="form-row">
            <div class="field">
                <label>Item</label>
                <input id="itemInput" type="text" placeholder="e.g. Tritanium, Rifter" autocomplete="off" />
            </div>
            <div class="field short">
                <label>Region</label>
                <select id="regionSelect">
                    <option value="all" selected>All Regions</option>
                    <option value="10000002">The Forge (Jita)</option>
                    <option value="10000043">Domain (Amarr)</option>
                    <option value="10000032">Sinq Laison (Dodixie)</option>
                    <option value="10000030">Derelik (Hek)</option>
                </select>
            </div>
            <button id="searchBtn">
                <span id="btnText">Check!</span>
                <span id="btnSpinner" class="spinner hidden"></span>
            </button>
        </div>
        <div id="error" class="error hidden"></div>
    </section>

    <section id="message" class="message-info"></section>

    <section id="summary" class="summary hidden">
        <div class="sum-box"><div class="sum-val" id="topSell">—</div><div class="sum-label">Top Sell</div></div>
        <div class="sum-box"><div class="sum-val" id="topBuy">—</div><div class="sum-label">Top Buy</div></div>
        <div class="sum-box"><div class="sum-val" id="avg30">—</div><div class="sum-label">Avg (30d)</div></div>
        <div class="sum-box"><div class="sum-val" id="vol30">—</div><div class="sum-label">Volume (30d)</div></div>
    </section>

    <section id="results" class="results hidden">
        <div class="results-title">
            <span id="itemTitle"></span>
            <span class="eve-time" id="eveTime"></span>
        </div>
        
        <div class="market-tables">
            <div class="market-table-container">
                <h3 class="table-heading">Sell Orders</h3>
                <div class="orders-list" id="sellOrders"></div>
            </div>
            
            <div class="market-table-container">
                <h3 class="table-heading">Buy Orders</h3>
                <div class="orders-list" id="buyOrders"></div>
            </div>
        </div>
    </section>

    <section id="historySection" class="history-section hidden">
        <h3 class="section-heading">30 Day Price History</h3>
        <canvas id="historyChart"></canvas>
    </section>

    <footer>
        <p>RustyBot is an unofficial EVE Online tool, not affiliated with <a href="https://www.ccpgames.com" target="_blank">CCP Games</a>.</p>
    </footer>
</div>
<script src="app.js"></script>
</body>
</html>
